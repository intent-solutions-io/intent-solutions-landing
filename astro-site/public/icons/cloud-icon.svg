<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Server racks (3 stacked) -->
  <!-- Bottom rack -->
  <rect x="14" y="40" width="36" height="10" rx="2" stroke="url(#server-gradient)" stroke-width="2" fill="url(#server-fill)" />
  <circle cx="20" cy="45" r="1.5" fill="#00D9FF" />
  <circle cx="25" cy="45" r="1.5" fill="#5B8DEF" />
  <line x1="30" y1="43" x2="44" y2="43" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />
  <line x1="30" y1="47" x2="44" y2="47" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />

  <!-- Middle rack -->
  <rect x="14" y="27" width="36" height="10" rx="2" stroke="url(#server-gradient)" stroke-width="2" fill="url(#server-fill)" />
  <circle cx="20" cy="32" r="1.5" fill="#00D9FF" />
  <circle cx="25" cy="32" r="1.5" fill="#A78BFA" />
  <line x1="30" y1="30" x2="44" y2="30" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />
  <line x1="30" y1="34" x2="44" y2="34" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />

  <!-- Top rack -->
  <rect x="14" y="14" width="36" height="10" rx="2" stroke="url(#server-gradient)" stroke-width="2" fill="url(#server-fill)" />
  <circle cx="20" cy="19" r="1.5" fill="#00D9FF" />
  <circle cx="25" cy="19" r="1.5" fill="#5B8DEF" />
  <line x1="30" y1="17" x2="44" y2="17" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />
  <line x1="30" y1="21" x2="44" y2="21" stroke="url(#line-grad)" stroke-width="1" stroke-linecap="round" />

  <!-- Cloud connection above -->
  <path d="M28 8C26 8 24 9.5 24 11.5C24 11.7 24 11.9 24.1 12C22.9 12.3 22 13.4 22 14.5C22 15.9 23.1 17 24.5 17H35.5C36.9 17 38 15.9 38 14.5C38 13.4 37.1 12.3 35.9 12C36 11.9 36 11.7 36 11.5C36 9.5 34 8 32 8C31 8 30 8.4 29.3 9C28.9 8.4 28.5 8 28 8Z"
        fill="url(#cloud-grad)"
        opacity="0.6" />

  <!-- Connection lines from cloud to servers -->
  <line x1="30" y1="17" x2="30" y2="14" stroke="url(#connect-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
  <line x1="34" y1="17" x2="34" y2="14" stroke="url(#connect-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />

  <!-- Gradients -->
  <defs>
    <linearGradient id="server-gradient" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <linearGradient id="server-fill" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="line-grad" x1="30" y1="0" x2="44" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.6" />
    </linearGradient>
    <linearGradient id="cloud-grad" x1="22" y1="8" x2="38" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#5B8DEF" />
    </linearGradient>
    <linearGradient id="connect-grad" x1="30" y1="14" x2="34" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#5B8DEF" />
    </linearGradient>
  </defs>
</svg>
