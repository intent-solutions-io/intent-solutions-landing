<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pipeline nodes -->
  <circle cx="12" cy="32" r="5" fill="url(#pipe-gradient1)" />
  <circle cx="32" cy="20" r="5" fill="url(#pipe-gradient2)" />
  <circle cx="32" cy="44" r="5" fill="url(#pipe-gradient2)" />
  <circle cx="52" cy="32" r="5" fill="url(#pipe-gradient3)" />

  <!-- Connection paths with arrows -->
  <path d="M17 32L27 23" stroke="url(#line-gradient)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M17 32L27 41" stroke="url(#line-gradient)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M37 20L47 32" stroke="url(#line-gradient)" stroke-width="2.5" stroke-linecap="round" />
  <path d="M37 44L47 32" stroke="url(#line-gradient)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Arrow heads -->
  <path d="M25 24L27 23L26 25" stroke="url(#arrow-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M25 40L27 41L26 39" stroke="url(#arrow-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M45 31L47 32L45 33" stroke="url(#arrow-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Pulse rings around nodes -->
  <circle cx="12" cy="32" r="8" stroke="url(#pulse-gradient)" stroke-width="1" fill="none" opacity="0.3" />
  <circle cx="52" cy="32" r="8" stroke="url(#pulse-gradient)" stroke-width="1" fill="none" opacity="0.3" />

  <!-- Inner details on nodes -->
  <circle cx="12" cy="32" r="2" fill="#00D9FF" opacity="0.8" />
  <circle cx="52" cy="32" r="2" fill="#00D9FF" opacity="0.8" />

  <!-- Gradients -->
  <defs>
    <linearGradient id="pipe-gradient1" x1="7" y1="27" x2="17" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" />
      <stop offset="100%" stop-color="#00D9FF" />
    </linearGradient>
    <linearGradient id="pipe-gradient2" x1="27" y1="15" x2="37" y2="49" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#5B8DEF" />
    </linearGradient>
    <linearGradient id="pipe-gradient3" x1="47" y1="27" x2="57" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <linearGradient id="line-gradient" x1="12" y1="20" x2="52" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="arrow-gradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#5B8DEF" />
    </linearGradient>
    <linearGradient id="pulse-gradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D9FF" />
      <stop offset="100%" stop-color="#5B8DEF" />
    </linearGradient>
  </defs>
</svg>
