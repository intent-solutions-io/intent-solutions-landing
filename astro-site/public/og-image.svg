<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#18181B"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27272A;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#09090B;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Main Title -->
  <text x="600" y="220" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="#FAFAFA" text-anchor="middle">
