<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUSTLE Survey OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #18181B;
      display: flex;
      align-items: center;
      justify-center;
      min-height: 100vh;
    }

    .og-card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #18181B 0%, #27272A 50%, #09090B 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    .og-card::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(228, 228, 231, 0.03);
      border-radius: 50%;
      top: -100px;
      right: -100px;
      filter: blur(100px);
    }

    .og-card::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(228, 228, 231, 0.02);
      border-radius: 50%;
      bottom: -50px;
      left: -50px;
      filter: blur(80px);
    }

    .content {
      text-align: center;
      z-index: 10;
    }

    .title {
      font-size: 96px;
      font-weight: 900;
      color: #FAFAFA;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 42px;
      font-weight: 500;
      color: #A1A1AA;
      margin-bottom: 60px;
      line-height: 1.3;
    }

    .details {
      font-size: 32px;
      font-weight: 400;
      color: #E4E4E7;
      margin-bottom: 80px;
    }

    .brand {
      font-size: 28px;
      font-weight: 600;
      color: #71717A;
      position: absolute;
      bottom: 60px;
    }

    .badge {
      display: inline-block;
      background: rgba(228, 228, 231, 0.1);
      border: 1px solid rgba(228, 228, 231, 0.2);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 24px;
      color: #E4E4E7;
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <div class="content">
      <div class="title">HUSTLE Survey</div>
      <div class="subtitle">Help Build the Future of Youth Sports</div>
      <div class="details">
        <span class="badge">⏱️ 8-10 minutes</span>
        <span class="badge">🎁 1 year free</span>
      </div>
    </div>
    <div class="brand">intentsolutions.io/survey</div>
  </div>

  <div style="margin-top: 40px; text-align: center; color: #A1A1AA; font-size: 14px;">
    <p>📸 Screenshot this at exactly 1200x630px to create og-survey.png</p>
    <p>Use browser dev tools: Set viewport to 1200x630, zoom to 100%, screenshot element</p>
  </div>
</body>
</html>
